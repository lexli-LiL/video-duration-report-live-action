<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Duration Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #131312;
    --surface:   #1c1c1a;
    --surface2:  #222220;
    --border:    #2e2e2b;
    --border2:   #3a3a36;
    --text:      #e4dfd5;
    --muted:     #7a7770;
    --accent:    #c8923a;
    --accent-dim:#7a5520;
    --total-bg:  #1f1e1b;
    --error:     #c05050;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 24px 80px;
  }

  .container {
    width: 100%;
    max-width: 860px;
  }

  /* ── HEADER ── */
  .header { margin-bottom: 48px; }

  .header-rule {
    width: 32px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 4px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
    background: var(--surface);
    position: relative;
    margin-bottom: 16px;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: #1e1c18;
  }

  .upload-zone.loaded {
    border-color: var(--accent-dim);
    border-style: solid;
    background: var(--surface);
    padding: 24px 32px;
  }

  .upload-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    opacity: 0.35;
  }

  .upload-zone.loaded .upload-icon { display: none; }

  .upload-prompt {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }

  .upload-prompt strong {
    color: var(--accent);
    font-weight: 500;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    opacity: 0.7;
  }

  .upload-status {
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .upload-zone.loaded .upload-status { display: flex; }
  .upload-zone.loaded .upload-prompt,
  .upload-zone.loaded .upload-hint,
  .upload-zone.loaded .upload-icon { display: none; }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .status-filename {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-meta {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .reupload-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .reupload-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #file-input { display: none; }

  /* ── DOWNLOAD BUTTON ── */
  .download-row {
    display: none;
    margin-bottom: 24px;
  }

  .download-row.visible { display: block; }

  .download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--accent);
    color: #0e0d0b;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 22px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .download-btn:hover {
    opacity: 0.88;
    transform: translateY(-1px);
  }

  .download-btn:active { transform: translateY(0); }
  .download-btn svg { flex-shrink: 0; }

  /* ── ERROR ── */
  .error-banner {
    display: none;
    background: #1e1212;
    border: 1px solid var(--error);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 24px;
  }

  .error-banner.visible { display: block; }

  /* ── RESULTS HEADER ── */
  .results-header {
    display: none;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .results-header.visible { display: flex; }

  .results-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .results-count {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── TABLE ── */
  .table-wrap {
    display: none;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .table-wrap.visible { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
  }

  th:not(:first-child) { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover:not(.row-blank):not(.row-total) { background: #1a1918; }

  td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  td:not(:first-child) { text-align: center; }

  .td-filename {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--text);
    white-space: nowrap;
  }

  .td-duration {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
  }

  .td-flag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
  }

  .ch-marker {
    display: inline-block;
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    margin-right: 8px;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }

  .row-blank td {
    padding: 0;
    height: 1px;
    background: var(--border);
  }

  .row-total {
    background: var(--total-bg) !important;
    border-top: 1px solid var(--border2) !important;
  }

  .row-total td { padding: 11px 14px; }

  .row-total .td-filename {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .row-total .td-duration {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── FAKE VIDEO ROW ── */
  .row-fake td { opacity: 0.45; font-style: italic; }

  /* ── REMINDER ROW ── */
  .row-reminder td {
    padding: 10px 14px;
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 64px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.5;
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">
  <div class="container">

    <header class="header">
      <div class="header-rule"></div>
      <h1>Video Duration Report</h1>
      <p>Upload a source video CSV to generate a consolidated duration report.</p>
    </header>

    <!-- Upload zone -->
    <div class="upload-zone" id="drop-zone">
      <svg class="upload-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="10" width="32" height="24" rx="2" stroke="#c8923a" stroke-width="1.5"/>
        <path d="M14 20l6-6 6 6M20 14v14" stroke="#c8923a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="upload-prompt">
        <strong>Choose a CSV file</strong> or drag it here
      </div>
      <div class="upload-hint">Exports from your video production workflow</div>
      <div class="upload-status" id="upload-status">
        <div class="status-dot"></div>
        <span class="status-filename" id="status-filename"></span>
        <span class="status-meta" id="status-meta"></span>
        <button class="reupload-btn" id="reupload-btn">Change file</button>
      </div>
    </div>
    <input type="file" id="file-input" accept=".csv,text/csv">

    <!-- Download button (shown right after file loads) -->
    <div class="download-row" id="download-row">
      <button class="download-btn" id="download-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="#0e0d0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download CSV
      </button>
    </div>

    <!-- Error -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Results header -->
    <div class="results-header" id="results-header">
      <span class="results-label">Report Preview</span>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th>Filename</th>
            <th>Duration</th>
            <th>Retake</th>
            <th>Pickup</th>
            <th>Insert</th>
            <th>B-Roll</th>
            <th>A/B Cam</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

  </div>

  <footer class="footer">
    Processes files locally &mdash; no data is uploaded anywhere.
  </footer>
</div>

<a id="dl-link" style="display:none"></a>

<script>
// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────

function parseDuration(s) {
  if (!s || !s.trim()) return 0;
  const parts = s.trim().split(':').map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function formatDuration(sec) {
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function stripExtension(name) {
  return name.replace(/\.(mov|mp4|mxf|mts|avi|m4v|r3d|braw|dpx|mkv)$/i, '');
}

/**
 * Semantically parse a video filename by identifying each element by its
 * characteristics rather than its fixed position.
 *
 * Guaranteed elements (detected regardless of position or case):
 *   courseID   — first long numeric segment (5+ digits)
 *   locale     — 'en' + 'US' consecutive pair (case-insensitive)
 *   chapter    — first 1-2 digit number (or XX) after locale
 *   lesson     — second 1-2 digit number (or XX) after locale
 *   descriptor — first meaningful word after chapter/lesson
 *
 * Remaining segments parsed for: take number, PU marker, cam (A/B), shot type.
 * Handles: _VT_002 suffixes, extensions, TK1/01/01A-1 takes,
 *          PU/01a-PU/01A-1_PU/01a-1 pickups.
 * Shot types detected via fused suffix on the descriptor word:
 *   ShortnameINS   → shotType 'ins'   (Insert — supplemental to Shortname)
 *   ShortnameBROLL → shotType 'broll' (B-Roll — supplemental to Shortname)
 * INS/BROLL files share the base descriptor's group key and output row.
 */
function parseFilename(rawName) {
  const name  = stripExtension(rawName.trim());
  const parts = name.split('_');
  if (parts.length < 6) return null;

  // 1. courseID: first segment that is 5+ digits
  const courseId = parts.find(p => /^\d{5,}$/.test(p));
  if (!courseId) return null;

  // 2. Locale: find 'en' immediately followed by 'US'
  let localePos = -1;
  for (let i = 0; i < parts.length - 1; i++) {
    if (parts[i].toLowerCase() === 'en' && parts[i+1].toLowerCase() === 'us') {
      localePos = i; break;
    }
  }
  if (localePos < 0) return null;

  // 3. Chapter + lesson: first two 1-2 digit groups (or XX) after locale
  let chapter = null, lesson = null, descStart = localePos + 2;
  for (let i = localePos + 2; i < parts.length; i++) {
    const p = parts[i];
    if (/^\d{1,2}$/.test(p) || p.toLowerCase() === 'xx') {
      if (!chapter) { chapter = p.toUpperCase().padStart(2, '0'); }
      else if (!lesson) { lesson = p.toUpperCase().padStart(2, '0'); descStart = i + 1; break; }
    }
  }
  if (!chapter || !lesson) return null;

  // 4. Descriptor: first non-reserved word after chapter/lesson
  const RESERVED = new Set(['VT', 'LA', 'A', 'B']);
  let descriptor = null, tailStart = descStart;
  for (let i = descStart; i < parts.length; i++) {
    const p = parts[i], t = p.toUpperCase();
    if (RESERVED.has(t)) break;
    if (/^\d+$/.test(p)) break;          // pure number = take indicator
    if (/^[Tt][Kk]\d/.test(p)) break;   // TK prefix
    if (/^[Pp][Uu]/.test(p)) break;     // PU prefix
    descriptor = p; tailStart = i + 1; break;
  }
  if (!descriptor) return null;

  // 4b. Detect INS (Insert) or BROLL (B-Roll) — as a standalone descriptor word,
  //     or as a suffix fused directly to it. Both forms group with the lesson's main row.
  //     ShortnameINS  → baseDescriptor: Shortname, shotType: 'ins'
  //     ShortnameBROLL → baseDescriptor: Shortname, shotType: 'broll'
  //     INS (standalone) → shotType: 'ins', baseDescriptor: ''
  let shotType = 'main', baseDescriptor = descriptor;
  const dUpper = descriptor.toUpperCase();
  if (dUpper === 'INS') {
    shotType = 'ins'; baseDescriptor = '';
  } else if (dUpper === 'BROLL' || dUpper === 'BROL') {
    shotType = 'broll'; baseDescriptor = '';
  } else if (dUpper.endsWith('BROLL') && descriptor.length > 5) {
    baseDescriptor = descriptor.slice(0, -5);
    shotType = 'broll';
  } else if (dUpper.endsWith('INS') && descriptor.length > 3) {
    baseDescriptor = descriptor.slice(0, -3);
    shotType = 'ins';
  }

  // 5. Find VT from the right in remaining parts
  const tail  = parts.slice(tailStart);
  let vtPos = -1;
  for (let i = tail.length - 1; i >= 0; i--) {
    if (tail[i].toUpperCase() === 'VT') { vtPos = i; break; }
  }
  const middle = vtPos >= 0 ? tail.slice(0, vtPos) : tail;

  // 6. Cam: any standalone A or B segment in middle (position-independent)
  let cam = null;
  const takeParts = [];
  for (const seg of middle) {
    if (cam === null && (seg.toUpperCase() === 'A' || seg.toUpperCase() === 'B')) {
      cam = seg.toUpperCase();
    } else {
      takeParts.push(seg);
    }
  }

  // 7. Take number and PU from takeParts
  let takeNum = null, isPU = false;
  for (const tp of takeParts) {
    const t = tp.toUpperCase();
    if (t === 'PU') {
      isPU = true;
    } else if (t === 'INS') {
      shotType = 'ins';
    } else if (t === 'BROLL' || t === 'BROL') {
      shotType = 'broll';
    } else if (t.includes('PU')) {
      isPU = true;
      const m = tp.match(/^(\d+)/);
      if (m && takeNum === null) takeNum = parseInt(m[1], 10);
    } else if (t.startsWith('TK')) {
      const n = parseInt(t.slice(2), 10);
      if (!isNaN(n) && takeNum === null) takeNum = n;
    } else if (/^\d+[a-zA-Z](-\d+)?$/.test(tp)) {
      // 01a-1 / 01A-2 / 01a style: digit + letter (+ optional -N) = pickup take
      isPU = true;
      const m = tp.match(/^(\d+)/);
      if (m && takeNum === null) takeNum = parseInt(m[1], 10);
    } else {
      const m = tp.match(/^(\d+)/);
      if (m && takeNum === null) takeNum = parseInt(m[1], 10);
    }
  }

  const take     = { type: isPU ? 'PU' : 'TK', num: takeNum };
  const stdName  = `${courseId}_EN_US_${chapter}_${lesson}_${baseDescriptor}_VT`;
  const groupKey = `${courseId}|${chapter}|${lesson}`;

  return { courseId, chapter, lesson, descriptor: baseDescriptor, shotType, take, cam, stdName, groupKey };
}

// ─────────────────────────────────────────────
// CSV Processing
// ─────────────────────────────────────────────

function parseSourceCSV(text) {
  text = text.replace(/^\uFEFF/, ''); // strip BOM
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) throw new Error('No data rows found in the file.');

  const header = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  const filenameIdx = header.findIndex(h => h.toLowerCase() === 'filename');
  const durationIdx = header.findIndex(h => h.toLowerCase() === 'duration');

  if (filenameIdx < 0) throw new Error('No "Filename" column found in CSV header.');
  if (durationIdx < 0) throw new Error('No "Duration" column found in CSV header.');

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols     = lines[i].split(',');
    const filename = (cols[filenameIdx] || '').trim().replace(/"/g, '');
    const duration = (cols[durationIdx] || '').trim().replace(/"/g, '');
    if (filename) rows.push({ filename, duration });
  }
  if (rows.length === 0) throw new Error('No data rows found after the header.');
  return rows;
}

function processCSV(text) {
  const sourceRows = parseSourceCSV(text);

  const groups   = new Map();
  const keyOrder = [];

  for (const row of sourceRows) {
    const info = parseFilename(row.filename);
    if (!info) continue;
    if (!groups.has(info.groupKey)) {
      groups.set(info.groupKey, { info, files: [], canonicalDescriptor: null });
      keyOrder.push(info.groupKey);
    }
    const grp = groups.get(info.groupKey);
    if (!grp.canonicalDescriptor && info.shotType === 'main') {
      grp.canonicalDescriptor = info.descriptor;
    }
    grp.files.push({ row, info });
  }

  if (groups.size === 0) throw new Error('No filenames matched the expected naming pattern.');

  // --- First pass: collect per-chapter data ---
  // chapterMap: chapter → [ { lessonInt, videoRow } ]
  const chapterMap = new Map();
  let grandTotal   = 0;
  let courseId     = null;
  let videoCount   = 0;

  for (const key of keyOrder) {
    const { info, files, canonicalDescriptor } = groups.get(key);
    if (info.chapter === 'XX') continue;

    if (!courseId) courseId = info.courseId;
    videoCount++;

    const totalSec = files.reduce((sum, f) => sum + parseDuration(f.row.duration), 0);
    grandTotal += totalSec;

    const tkNums = new Set();
    let puCount = 0, insCount = 0, brollCount = 0;
    const cams = new Set();

    for (const { info: fi } of files) {
      if (fi.shotType === 'ins')   { insCount++;   continue; }
      if (fi.shotType === 'broll') { brollCount++; continue; }
      // Only main-video files contribute to retake, pickup, and cam tracking
      if (fi.take.type === 'TK' && fi.take.num !== null) tkNums.add(fi.take.num);
      else if (fi.take.type === 'PU') puCount++;
      cams.add(fi.cam);
    }

    const retakeVal = tkNums.size > 1 ? String(tkNums.size) : '';
    const pickupVal = puCount > 0 ? String(puCount) : '';
    const insertVal = insCount > 0 ? String(insCount) : '';
    const brollVal  = brollCount > 0 ? String(brollCount) : '';
    const hasA = cams.has('A'), hasB = cams.has('B');
    const abVal = (hasA && hasB) ? 'A&B' : hasA ? 'A cam' : hasB ? 'B cam' : '';

    const lessonInt = parseInt(info.lesson, 10);

    const desc = canonicalDescriptor || info.descriptor || 'UNKNOWN';
    const stdName = `${info.courseId}_EN_US_${info.chapter}_${info.lesson}_${desc}_VT`;
    const videoRow = {
      type: 'video',
      filename: stdName,
      chapter:  info.chapter,
      lesson:   info.lesson,
      duration: formatDuration(totalSec),
      retake:   retakeVal,
      pickup:   pickupVal,
      insert:   insertVal,
      broll:    brollVal,
      abCam:    abVal,
    };

    if (!chapterMap.has(info.chapter)) chapterMap.set(info.chapter, []);
    chapterMap.get(info.chapter).push({ lessonInt: isNaN(lessonInt) ? null : lessonInt, videoRow });
  }

  if (videoCount === 0) throw new Error('No course videos found (all rows were utility clips or unrecognised).');

  // --- Second pass: sort within chapters, fill gaps, build output ---
  const output    = [];
  let firstChapter = true;

  for (const [chapter, lessonRows] of chapterMap) {
    if (!firstChapter) output.push({ type: 'blank' });
    firstChapter = false;

    // Sort by lesson number (null goes to end)
    lessonRows.sort((a, b) => {
      if (a.lessonInt === null) return 1;
      if (b.lessonInt === null) return -1;
      return a.lessonInt - b.lessonInt;
    });

    let prevLesson = 0;
    for (const { lessonInt, videoRow } of lessonRows) {
      // Insert FAKEVIDEO rows for any gaps in lesson numbering (including before first lesson)
      if (lessonInt !== null) {
        for (let missing = prevLesson + 1; missing < lessonInt; missing++) {
          const missingStr = String(missing).padStart(2, '0');
          output.push({
            type:     'video',
            filename: `${courseId}_EN_US_${chapter}_${missingStr}_FAKEVIDEO`,
            chapter,
            lesson:   missingStr,
            duration: '0:02:00',
            retake:   '',
            pickup:   '',
            insert:   '',
            broll:    '',
            abCam:    '',
            isFake:   true,
          });
        }
      }
      output.push(videoRow);
      if (lessonInt !== null) prevLesson = lessonInt;
    }
  }

  output.push({ type: 'blank' });
  output.push({ type: 'note' });
  output.push({ type: 'total', duration: formatDuration(grandTotal) });

  return { rows: output, courseId, videoCount, sourceCount: sourceRows.length };
}

function rowsToCSV(rows) {
  const header = ['Filename', 'Duration', 'Retake', 'Pickup', 'Insert', 'B-Roll', 'A/B Cam'];
  const lines  = [header.join(',')];
  for (const r of rows) {
    if (r.type === 'blank') {
      lines.push(',,,,,,');
    } else if (r.type === 'total') {
      lines.push(`TOTAL,${r.duration},,,,,`);
    } else if (r.type === 'note') {
      lines.push(`NOTE,"1. A text article is added by default when a video sequence is missing. 2. The total runtime only includes the duration of all video files."`);
    } else {
      lines.push([r.filename, r.duration, r.retake, r.pickup, r.insert || '', r.broll || '', r.abCam].join(','));
    }
  }
  return lines.join('\n');
}

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────

const dropZone      = document.getElementById('drop-zone');
const fileInput     = document.getElementById('file-input');
const errorBanner   = document.getElementById('error-banner');
const resultsHeader = document.getElementById('results-header');
const tableWrap     = document.getElementById('table-wrap');
const resultBody    = document.getElementById('result-body');
const downloadRow   = document.getElementById('download-row');
const downloadBtn   = document.getElementById('download-btn');
const dlLink        = document.getElementById('dl-link');
const statusFilename = document.getElementById('status-filename');
const statusMeta    = document.getElementById('status-meta');
const reuploadBtn   = document.getElementById('reupload-btn');
const resultsCount  = document.getElementById('results-count');

let currentCSV = null;

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('visible');
}
function hideError() { errorBanner.classList.remove('visible'); }

function hideResults() {
  tableWrap.classList.remove('visible');
  resultsHeader.classList.remove('visible');
  downloadRow.classList.remove('visible');
  resultBody.innerHTML = '';
}

function renderResults(data, filename) {
  hideError();
  hideResults();

  dropZone.classList.add('loaded');
  statusFilename.textContent = filename;
  statusMeta.textContent     = `${data.sourceCount} source rows`;

  const frag = document.createDocumentFragment();
  for (const row of data.rows) {
    const tr = document.createElement('tr');
    if (row.type === 'blank') {
      tr.className = 'row-blank';
      tr.innerHTML = '<td colspan="7"></td>';
    } else if (row.type === 'total') {
      tr.className = 'row-total';
      tr.innerHTML = `
        <td class="td-filename">Total</td>
        <td class="td-duration">${row.duration}</td>
        <td></td><td></td><td></td><td></td><td></td>`;
    } else if (row.type === 'note') {
      tr.className = 'row-reminder';
      tr.innerHTML = `<td class="td-reminder"><strong>NOTE</strong></td><td colspan="6" class="td-reminder">1. A text article is added by default when a video sequence is missing. 2. The total runtime only includes the duration of all video files.</td>`;
    } else {
      if (row.isFake) tr.className = 'row-fake';
      tr.innerHTML = `
        <td class="td-filename">
          <span class="ch-marker">${row.chapter}_${row.lesson}</span>${row.filename}
        </td>
        <td class="td-duration">${row.duration}</td>
        <td class="td-flag">${row.retake}</td>
        <td class="td-flag">${row.pickup}</td>
        <td class="td-flag">${row.insert || ''}</td>
        <td class="td-flag">${row.broll || ''}</td>
        <td class="td-flag">${row.abCam}</td>`;
    }
    frag.appendChild(tr);
  }
  resultBody.appendChild(frag);

  resultsCount.textContent = `${data.videoCount} videos`;
  downloadRow.classList.add('visible');
  resultsHeader.classList.add('visible');
  tableWrap.classList.add('visible');

  currentCSV = { csvText: rowsToCSV(data.rows), courseId: data.courseId };
}

function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) {
    showError('Please select a .csv file.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = processCSV(e.target.result);
      renderResults(data, file.name);
    } catch (err) {
      hideResults();
      dropZone.classList.remove('loaded');
      showError(err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

dropZone.addEventListener('click', e => {
  if (e.target === reuploadBtn) return;
  fileInput.click();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
  fileInput.value = '';
});

reuploadBtn.addEventListener('click', e => {
  e.stopPropagation();
  dropZone.classList.remove('loaded');
  hideResults();
  hideError();
  currentCSV = null;
  fileInput.click();
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

downloadBtn.addEventListener('click', () => {
  if (!currentCSV) return;
  const blob = new Blob(['\uFEFF' + currentCSV.csvText], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  dlLink.href     = url;
  dlLink.download = `Final Video Info_${currentCSV.courseId}.csv`;
  dlLink.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
</script>
</body>
</html>
