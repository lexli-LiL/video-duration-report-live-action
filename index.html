<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Duration Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #131312;
    --surface:   #1c1c1a;
    --surface2:  #222220;
    --border:    #2e2e2b;
    --border2:   #3a3a36;
    --text:      #e4dfd5;
    --muted:     #7a7770;
    --accent:    #c8923a;
    --accent-dim:#7a5520;
    --total-bg:  #1f1e1b;
    --error:     #c05050;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 24px 80px;
  }

  .container {
    width: 100%;
    max-width: 860px;
  }

  /* ── HEADER ── */
  .header {
    margin-bottom: 48px;
  }

  .header-rule {
    width: 32px;
    height: 2px;
    background: var(--accent);
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── UPLOAD ZONE ── */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 4px;
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s;
    background: var(--surface);
    position: relative;
    margin-bottom: 32px;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: #1e1c18;
  }

  .upload-zone.loaded {
    border-color: var(--accent-dim);
    border-style: solid;
    background: var(--surface);
    padding: 24px 32px;
  }

  .upload-icon {
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    opacity: 0.35;
  }

  .upload-zone.loaded .upload-icon {
    display: none;
  }

  .upload-prompt {
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
  }

  .upload-prompt strong {
    color: var(--accent);
    font-weight: 500;
  }

  .upload-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    opacity: 0.7;
  }

  .upload-status {
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }

  .upload-zone.loaded .upload-status { display: flex; }
  .upload-zone.loaded .upload-prompt,
  .upload-zone.loaded .upload-hint,
  .upload-zone.loaded .upload-icon { display: none; }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .status-filename {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    flex: 1;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-meta {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .reupload-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    padding: 3px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .reupload-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  #file-input { display: none; }

  /* ── ERROR ── */
  .error-banner {
    display: none;
    background: #1e1212;
    border: 1px solid var(--error);
    border-radius: 3px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--error);
    margin-bottom: 24px;
  }

  .error-banner.visible { display: block; }

  /* ── RESULTS HEADER ── */
  .results-header {
    display: none;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }

  .results-header.visible { display: flex; }

  .results-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .results-count {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  /* ── TABLE ── */
  .table-wrap {
    display: none;
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 24px;
  }

  .table-wrap.visible { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    font-weight: 500;
    color: var(--muted);
    white-space: nowrap;
  }

  th:not(:first-child) { text-align: center; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover:not(.row-blank):not(.row-total) {
    background: #1a1918;
  }

  td {
    padding: 9px 14px;
    vertical-align: middle;
  }

  td:not(:first-child) { text-align: center; }

  .td-filename {
    font-family: 'DM Mono', monospace;
    font-size: 11.5px;
    color: var(--text);
    white-space: nowrap;
  }

  .td-duration {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
  }

  .td-flag {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
  }

  /* Chapter marker in filename column */
  .ch-marker {
    display: inline-block;
    font-size: 9.5px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    margin-right: 8px;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }

  /* Blank separator row */
  .row-blank td {
    padding: 0;
    height: 1px;
    background: var(--border);
  }

  /* Total row */
  .row-total {
    background: var(--total-bg) !important;
    border-top: 1px solid var(--border2) !important;
  }

  .row-total td {
    padding: 11px 14px;
  }

  .row-total .td-filename {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .row-total .td-duration {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  /* ── DOWNLOAD BUTTON ── */
  .download-row {
    display: none;
  }

  .download-row.visible { display: flex; justify-content: flex-end; }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #0e0d0b;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 22px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.01em;
  }

  .download-btn:hover {
    opacity: 0.88;
    transform: translateY(-1px);
  }

  .download-btn:active {
    transform: translateY(0);
  }

  .download-btn svg { flex-shrink: 0; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 64px;
    font-size: 11px;
    color: var(--muted);
    opacity: 0.5;
    text-align: center;
  }
</style>
</head>
<body>
<div class="page">
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-rule"></div>
      <h1>Video Duration Report</h1>
      <p>Upload a source video CSV to generate a consolidated duration report.</p>
    </header>

    <!-- Upload zone -->
    <div class="upload-zone" id="drop-zone">
      <svg class="upload-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="10" width="32" height="24" rx="2" stroke="#c8923a" stroke-width="1.5"/>
        <path d="M14 20l6-6 6 6M20 14v14" stroke="#c8923a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="upload-prompt">
        <strong>Choose a CSV file</strong> or drag it here
      </div>
      <div class="upload-hint">Exports from your video production workflow</div>

      <div class="upload-status" id="upload-status">
        <div class="status-dot"></div>
        <span class="status-filename" id="status-filename"></span>
        <span class="status-meta" id="status-meta"></span>
        <button class="reupload-btn" id="reupload-btn">Change file</button>
      </div>
    </div>
    <input type="file" id="file-input" accept=".csv,text/csv">

    <!-- Error -->
    <div class="error-banner" id="error-banner"></div>

    <!-- Results header -->
    <div class="results-header" id="results-header">
      <span class="results-label">Report Preview</span>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap" id="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th>Filename</th>
            <th>Duration</th>
            <th>Retake(s)</th>
            <th>Pickup</th>
            <th>A/B Cam</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

    <!-- Download -->
    <div class="download-row" id="download-row">
      <button class="download-btn" id="download-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="#0e0d0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download CSV
      </button>
    </div>

  </div>

  <footer class="footer">
    Processes files locally &mdash; no data is uploaded anywhere.
  </footer>
</div>

<!-- ── HIDDEN LINK FOR DOWNLOAD ── -->
<a id="dl-link" style="display:none"></a>

<script>
// ─────────────────────────────────────────────
// CSV Processing Logic
// ─────────────────────────────────────────────

function parseDuration(s) {
  if (!s || !s.trim()) return 0;
  const parts = s.trim().split(':').map(Number);
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  return 0;
}

function formatDuration(sec) {
  sec = Math.round(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function parseFilename(name) {
  const parts = name.trim().split('_');
  if (parts.length < 9) return null;
  const courseId   = parts[0];
  const chapter    = parts[3].toUpperCase();
  const lesson     = parts[4].toUpperCase();
  const descriptor = parts[5];
  const take       = parts[6];
  const cam        = parts[7];
  const stdName    = `${courseId}_EN_US_${chapter}_${lesson}_${descriptor}_VT`;
  const groupKey   = `${courseId}|${chapter}|${lesson}|${descriptor.toLowerCase()}`;
  return { courseId, chapter, lesson, descriptor, take, cam, stdName, groupKey };
}

function parseSourceCSV(text) {
  // Remove BOM
  text = text.replace(/^\uFEFF/, '');
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  if (lines.length < 2) throw new Error('No data rows found in the file.');

  const header = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  const filenameIdx = header.findIndex(h => h.toLowerCase() === 'filename');
  const durationIdx = header.findIndex(h => h.toLowerCase() === 'duration');

  if (filenameIdx < 0) throw new Error('No "Filename" column found in CSV header.');
  if (durationIdx < 0) throw new Error('No "Duration" column found in CSV header.');

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',');
    const filename = (cols[filenameIdx] || '').trim().replace(/"/g, '');
    const duration = (cols[durationIdx] || '').trim().replace(/"/g, '');
    if (filename) rows.push({ filename, duration });
  }
  if (rows.length === 0) throw new Error('No data rows found after the header.');
  return rows;
}

function processCSV(text) {
  const sourceRows = parseSourceCSV(text);

  // Group by video identity
  const groups  = new Map();
  const keyOrder = [];

  for (const row of sourceRows) {
    const info = parseFilename(row.filename);
    if (!info) continue;
    if (!groups.has(info.groupKey)) {
      groups.set(info.groupKey, { info, files: [] });
      keyOrder.push(info.groupKey);
    }
    groups.get(info.groupKey).files.push({ row, info });
  }

  if (groups.size === 0) throw new Error('No filenames matched the expected naming pattern.');

  // Build output rows
  const output = [];
  let currentChapter = null;
  let grandTotal     = 0;
  let courseId       = null;
  let videoCount     = 0;

  for (const key of keyOrder) {
    const { info, files } = groups.get(key);

    // Skip XX utility clips
    if (info.chapter === 'XX') continue;

    if (!courseId) courseId = info.courseId;
    videoCount++;

    // Chapter separator
    if (currentChapter !== null && info.chapter !== currentChapter) {
      output.push({ type: 'blank' });
    }
    currentChapter = info.chapter;

    const totalSec = files.reduce((sum, f) => sum + parseDuration(f.row.duration), 0);
    grandTotal += totalSec;

    const takes = files.map(f => f.info.take.toUpperCase());
    const cams  = files.map(f => f.info.cam.toUpperCase());

    const retakeNums = [...new Set(
      takes.filter(t => /^\d+$/.test(t) && parseInt(t, 10) >= 2)
           .map(t => parseInt(t, 10))
    )].sort((a, b) => a - b);

    const retakeVal  = retakeNums.length ? 'TK' + retakeNums.join(',') : '';
    const hasPickup  = takes.some(t => t === 'PU');
    const hasABCam   = cams.includes('A') && cams.includes('B');

    output.push({
      type:     'video',
      filename: info.stdName,
      chapter:  info.chapter,
      lesson:   info.lesson,
      duration: formatDuration(totalSec),
      retake:   retakeVal,
      pickup:   hasPickup ? 'X' : '',
      abCam:    hasABCam  ? 'X' : '',
    });
  }

  if (videoCount === 0) throw new Error('No course videos found (all rows were utility clips or unrecognised).');

  // Total row
  output.push({ type: 'blank' });
  output.push({ type: 'total', duration: formatDuration(grandTotal) });

  return { rows: output, courseId, videoCount, sourceCount: sourceRows.length };
}

function rowsToCSV(rows) {
  const header = ['Filename', 'Duration', 'Retake(s)', 'Pickup', 'A/B Cam'];
  const lines  = [header.join(',')];
  for (const r of rows) {
    if (r.type === 'blank') {
      lines.push(',,,, ');
    } else if (r.type === 'total') {
      lines.push(`TOTAL,${r.duration},,,`);
    } else {
      lines.push([r.filename, r.duration, r.retake, r.pickup, r.abCam].join(','));
    }
  }
  return lines.join('\n');
}

// ─────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────

const dropZone   = document.getElementById('drop-zone');
const fileInput  = document.getElementById('file-input');
const errorBanner  = document.getElementById('error-banner');
const resultsHeader = document.getElementById('results-header');
const tableWrap  = document.getElementById('table-wrap');
const resultBody = document.getElementById('result-body');
const downloadRow = document.getElementById('download-row');
const downloadBtn = document.getElementById('download-btn');
const dlLink     = document.getElementById('dl-link');
const statusFilename = document.getElementById('status-filename');
const statusMeta = document.getElementById('status-meta');
const reuploadBtn = document.getElementById('reupload-btn');
const resultsCount = document.getElementById('results-count');

let currentCSV = null; // { csvText, courseId }

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('visible');
}

function hideError() {
  errorBanner.classList.remove('visible');
}

function hideResults() {
  tableWrap.classList.remove('visible');
  resultsHeader.classList.remove('visible');
  downloadRow.classList.remove('visible');
  resultBody.innerHTML = '';
}

function renderResults(data, filename) {
  hideError();
  hideResults();

  // Status bar
  dropZone.classList.add('loaded');
  statusFilename.textContent = filename;
  statusMeta.textContent     = `${data.sourceCount} source rows`;

  // Table
  const frag = document.createDocumentFragment();

  for (const row of data.rows) {
    const tr = document.createElement('tr');

    if (row.type === 'blank') {
      tr.className = 'row-blank';
      tr.innerHTML = '<td colspan="5"></td>';
    } else if (row.type === 'total') {
      tr.className = 'row-total';
      tr.innerHTML = `
        <td class="td-filename">Total</td>
        <td class="td-duration">${row.duration}</td>
        <td></td><td></td><td></td>`;
    } else {
      const chLabel = `${row.chapter}_${row.lesson}`;
      tr.innerHTML = `
        <td class="td-filename">
          <span class="ch-marker">${chLabel}</span>${row.filename}
        </td>
        <td class="td-duration">${row.duration}</td>
        <td class="td-flag">${row.retake}</td>
        <td class="td-flag">${row.pickup}</td>
        <td class="td-flag">${row.abCam}</td>`;
    }

    frag.appendChild(tr);
  }

  resultBody.appendChild(frag);

  resultsCount.textContent = `${data.videoCount} videos`;
  resultsHeader.classList.add('visible');
  tableWrap.classList.add('visible');
  downloadRow.classList.add('visible');

  currentCSV = { csvText: rowsToCSV(data.rows), courseId: data.courseId };
}

function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.csv')) {
    showError('Please select a .csv file.');
    return;
  }

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = processCSV(e.target.result);
      renderResults(data, file.name);
    } catch (err) {
      hideResults();
      dropZone.classList.remove('loaded');
      showError(err.message);
    }
  };
  reader.readAsText(file, 'UTF-8');
}

// Click to browse
dropZone.addEventListener('click', e => {
  if (e.target === reuploadBtn) return;
  fileInput.click();
});

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
  fileInput.value = '';
});

// Re-upload
reuploadBtn.addEventListener('click', e => {
  e.stopPropagation();
  dropZone.classList.remove('loaded');
  hideResults();
  hideError();
  currentCSV = null;
  fileInput.click();
});

// Drag and drop
dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  handleFile(file);
});

// Download
downloadBtn.addEventListener('click', () => {
  if (!currentCSV) return;
  const blob = new Blob(['\uFEFF' + currentCSV.csvText], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  dlLink.href     = url;
  dlLink.download = `Final duration doc_${currentCSV.courseId}.csv`;
  dlLink.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
</script>
</body>
</html>
